- name: Installing stow
  apt: name=stow
  tags:
    - install
    - dotfiles
    - stow
- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: 'git@github.com:merlinvn/dotfiles.git'
    dest: "{{ lookup('env', 'HOME') }}/dotfiles"
  tags:
    - install
    - dotfiles
    - stow
- name: Stow dotfiles
  shell: cd $HOME/dotfiles && ./setup
  tags:
    - install
    - dotfiles
    - stow

