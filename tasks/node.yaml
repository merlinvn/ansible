- name: Install NodeJs
  become: yes
  apt:
    name: ['nodejs', 'npm']
  tags:
    - node

- name: Change file ownership
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ username }}"
    state: directory
  with_items:
    - ~/.npm
    - /usr/lib/node_modules
    - /usr/local/lib/node_modules

- name: Install n
  npm: 
    name: n
    global: true
  tags:
    - node
- name: n 14
  shell: n 14
  tags:
    - node
